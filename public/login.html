<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BattStat — Sign in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;--bg2:#ffffff;--bg3:#f1f0eb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9c9a92;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --red-bg:#fcebeb;--red-text:#a32d2d;--red-border:#f09595;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
  --text:#e8e6de;--text2:#9c9a92;--text3:#6b6a65;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --blue:#378add;--blue-bg:#042c53;
  --red-bg:#501313;--red-text:#f7c1c1;--red-border:#a32d2d;
}}
[data-theme="dark"]{
  --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
  --text:#e8e6de;--text2:#9c9a92;--text3:#6b6a65;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --blue:#378add;--blue-bg:#042c53;
  --red-bg:#501313;--red-text:#f7c1c1;--red-border:#a32d2d;
}
[data-theme="light"]{
  --bg:#f8f8f6;--bg2:#ffffff;--bg3:#f1f0eb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9c9a92;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --red-bg:#fcebeb;--red-text:#a32d2d;--red-border:#f09595;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.logo-icon{width:36px;height:36px;background:var(--blue-bg);border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:16px;font-weight:600}
.logo-sub{font-size:12px;color:var(--text2);margin-top:1px}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:24px}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
input{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);width:100%;outline:none;transition:border-color .12s}
input:focus{border-color:var(--blue)}
.field{margin-bottom:16px}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--text2);cursor:pointer}
.checkbox-row input[type=checkbox]{width:auto;cursor:pointer}
button{font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;padding:10px 0;width:100%;transition:opacity .12s}
button:hover{opacity:.88}
button:disabled{opacity:.5;cursor:not-allowed}
.error{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red-border);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:16px;display:none}
.error.show{display:block}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
        <rect x="3" y="7" width="14" height="9" rx="2" stroke="#185fa5" stroke-width="1.5"/>
        <rect x="17" y="10" width="2" height="3" rx="1" fill="#185fa5"/>
        <path d="M10 10L9 12H11L10 14" stroke="#185fa5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">BattStat</div>
      <div class="logo-sub">Battery Health Dashboard</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Use your local account or Active Directory credentials</p>

  <div class="error" id="error-msg"></div>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="username or domain\user">
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••">
  </div>
  <label class="checkbox-row">
    <input type="checkbox" id="persistent"> Keep me signed in
  </label>

  <button id="login-btn" onclick="doLogin()">Sign in</button>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

async function doLogin() {
  const username   = document.getElementById('username').value.trim();
  const password   = document.getElementById('password').value;
  const persistent = document.getElementById('persistent').checked;
  const btn        = document.getElementById('login-btn');
  const errorEl    = document.getElementById('error-msg');

  errorEl.classList.remove('show');
  if (!username || !password) { showError('Please enter your username and password'); return; }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const res  = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password, persistent }),
    });
    const json = await res.json();
    if (json.ok) {
      window.location.href = '/';
    } else {
      showError(json.error || 'Sign in failed');
    }
  } catch (e) {
    showError('Network error — please try again');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'Sign in';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('password').value = '';
  document.getElementById('password').focus();
}

window.addEventListener('load', () => {
  document.getElementById('username').focus();
  // Apply saved theme preference
  var saved = localStorage.getItem('battstat-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
});
</script>
</body>
</html>
